<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Transaction Ledger — Immutable record of all processed transactions across the network.">
    <title>Ledger — The Kinetic Ledger</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/ledger.css">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <div class="app-layout">

        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header class="navbar" id="navbar"></header>

            <div class="page-content">
                <div class="page-header" style="margin-bottom: 20px;">
                    <h1 style="font-size: 32px;">Transaction Ledger</h1>
                    <p>Immutable record of all processed transactions across the network.</p>
                </div>

                <div class="ledger-controls">
                    <div class="ledger-search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="ledgerSearch" placeholder="Search Hex ID or Originator...">
                    </div>
                    <button class="ledger-filter" id="filterBtn">
                        <span class="filter-label">All Statuses</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                    </button>
                </div>

                <div class="ledger-table-wrap">
                    <table class="ledger-table">
                        <thead>
                            <tr>
                                <th>TRANSACTION ID</th>
                                <th>TIMESTAMP</th>
                                <th>ORIGINATOR</th>
                                <th style="text-align: right;">AMOUNT</th>
                                <th style="text-align: right;">STATUS</th>
                            </tr>
                        </thead>
                        <tbody id="ledgerBody"></tbody>
                    </table>
                    <div class="ledger-pagination">
                        <span class="pagination-info" id="paginationInfo">Showing 4 of 124,592 records</span>
                        <div class="pagination-controls">
                            <button class="pagination-btn" id="prevPage" disabled>Prev</button>
                            <button class="pagination-btn" id="nextPage">Next</button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="../js/global.js"></script>
    <script>
        document.getElementById('sidebar').innerHTML = getSidebarHTML('ledger');
        document.getElementById('navbar').innerHTML = getNavbarHTML('Search Hex ID or Originator...');
    </script>
    <script src="../js/ledger.js"></script>
</body>
</html>
