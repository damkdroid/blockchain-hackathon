<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Network Monitor — Real-time visualization of the decentralized node infrastructure.">
    <title>Network — The Kinetic Ledger</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/network.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header class="navbar" id="navbar"></header>

            <div class="page-content">
                <div class="page-header" style="margin-bottom: 24px;">
                    <h1 style="font-size: 32px;">Network Monitor</h1>
                    <p>Real-time visualization of decentralized node connectivity and protocol health.</p>
                </div>

                <div class="network-grid">
                    <div class="network-main-card">
                        <div class="network-canvas-header">
                            <div class="filter-controls">
                                <select id="companyFilter" class="canvas-select">
                                    <option value="all">All Transactions</option>
                                    <!-- Companies injected here -->
                                </select>
                            </div>
                            <div class="canvas-controls">
                                <button class="canvas-btn" id="resetZoom" title="Reset View">
                                    <i class="fa-solid fa-compress"></i>
                                </button>
                                <button class="canvas-btn" id="toggleLabels" title="Toggle Labels">
                                    <i class="fa-solid fa-tag"></i>
                                </button>
                            </div>
                        </div>
                        <div class="network-canvas-wrapper" id="canvasWrapper">
                            <canvas id="networkCanvas"></canvas>
                            <div class="canvas-overlay" id="nodeInfoOverlay">
                                <div class="overlay-content">
                                    <h4 id="nodeId">Node: 0x8a...2b</h4>
                                    <div class="node-stat">
                                        <span>Total Volume:</span>
                                        <span id="nodeVolume" class="active">0.00 KLT</span>
                                    </div>
                                    <div class="node-stat">
                                        <span>Company:</span>
                                        <span id="nodeCompany">Global</span>
                                    </div>
                                    <div class="node-stat">
                                        <span>Role:</span>
                                        <span id="nodeRole">User</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="network-stats-sidebar">
                        <div class="mini-stat-card">
                            <div class="mini-stat-label">Total Transactions</div>
                            <div class="mini-stat-value" id="statTxs">0</div>
                            <div class="mini-stat-chart">
                                <div class="mini-bar" style="width: 100%;"></div>
                            </div>
                        </div>
                        <div class="mini-stat-card">
                            <div class="mini-stat-label">Active Companies</div>
                            <div class="mini-stat-value" id="statCompanies">0</div>
                            <div class="mini-stat-chart">
                                <div class="mini-bar" style="width: 100%; background: var(--accent-green);"></div>
                            </div>
                        </div>
                        <div class="mini-stat-card">
                            <div class="mini-stat-label">Block Height</div>
                            <div class="mini-stat-value">#0</div>
                            <div class="mini-stat-chart">
                                <div class="mini-bar" style="width: 95%;"></div>
                            </div>
                        </div>

                        <div class="peer-list-card">
                            <h3>Connected Peers</h3>
                            <div class="peer-items" id="peerItems">
                                <!-- Peers will be injected here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="../js/wallet-api.js"></script>
    <script src="../js/global.js"></script>
    <script>
        document.getElementById('sidebar').innerHTML = getSidebarHTML('network');
        document.getElementById('navbar').innerHTML = getNavbarHTML('Search node ID or hash...');
    </script>
    <script src="../js/network.js"></script>
</body>

</html>
